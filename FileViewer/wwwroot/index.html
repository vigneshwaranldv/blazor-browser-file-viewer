<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Viewer - Markdown / Excel / PDF</title>
    <base href="/blazor-browser-file-viewer/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/toastui-editor.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="FileViewer.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f8f9fa;">
            <div style="text-align:center;color:#586069;">
                <svg class="loading-progress" style="width:4rem;height:4rem;display:block;margin:0 auto 12px;">
                    <circle r="40%" cx="50%" cy="50%" />
                    <circle r="40%" cx="50%" cy="50%" />
                </svg>
                <div class="loading-progress-text"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>

    <!-- Vendor JS libraries (offline copies) -->
    <script src="js/libs/pdf.min.js"></script>
    <script src="js/libs/xlsx.full.min.js"></script>
    <script src="js/libs/mermaid.min.js"></script>
    <script src="js/libs/toastui-editor-all.min.js"></script>

    <!-- JS interop modules -->
    <script src="js/interop/filesystem-interop.js"></script>
    <script src="js/interop/nav-tree-interop.js"></script>
    <script src="js/interop/markdown-interop.js"></script>
    <script src="js/interop/excel-interop.js"></script>
    <script src="js/interop/pdf-interop.js"></script>
    <script src="js/interop/app-interop.js"></script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
